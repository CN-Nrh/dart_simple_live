name: Android Build

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 设置 Java 环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 3. 设置 Flutter 环境（作者指定版本）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"  # 项目指定版本
          cache: true

      # 4. 获取依赖
      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      # 5. 编译 Debug APK
      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug

      # 6. 上传编译产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-android-debug
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
