name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Generate Signing Key
        run: |
          cd simple_live_app/android/app
          keytool -genkey -v -keystore release.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias release \
            -storepass 123456 \
            -keypass 123456 \
            -dname "CN=Simple Live, OU=Dev, O=Simple Live, L=Beijing, ST=Beijing, C=CN"
          cd ..
          echo "storeFile=release.keystore" > key.properties
          echo "storePassword=123456" >> key.properties
          echo "keyPassword=123456" >> key.properties
          echo "keyAlias=release" >> key.properties

      # 只编译 arm64-v8a 单架构
      - name: Build Release APK
        run: |
          cd simple_live_app
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-android-release
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
