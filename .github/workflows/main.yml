name: Android Build (Latest Flutter)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"  # 最新稳定版
          cache: true

      - name: Flutter Version Check
        run: flutter --version

      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug --verbose  # 加上详细日志
        continue-on-error: true  # 即使失败也继续，方便看日志

      - name: Upload APK (if successful)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
        if: success()
