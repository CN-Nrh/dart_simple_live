name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install Dependencies
        run: |
          cd simple_live_app
          flutter pub get

      # 新增：创建假的签名配置文件（绕过配置阶段的空指针错误）
      - name: Create dummy keystore config
        run: |
          cd simple_live_app/android
          echo "storeFile=debug.keystore" > key.properties
          echo "storePassword=android" >> key.properties
          echo "keyPassword=android" >> key.properties
          echo "keyAlias=androiddebugkey" >> key.properties

      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simple-live-android-debug
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
